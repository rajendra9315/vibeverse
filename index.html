<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Soundtrack</title>



<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:url('https://raw.githubusercontent.com/rawats7/vibeverse/main/background1.jpeg') center/cover no-repeat fixed;
    color:white;
}

/* Dark overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(to bottom,rgba(0,0,0,0.7),rgba(0,0,0,0.85));
    z-index:-1;
}

/* Main Content */
.main{
    padding:20px;
    padding-bottom:140px;
}

/* Header */
.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-weight:600;
    margin-bottom:10px;
}

/* Profile */
.profile{
    background:rgba(255,255,255,0.06);
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.1);
}

.profile-row{
    margin:6px 0;
    font-size:14px;
    opacity:0.9;
}

.profile svg{
    width:16px;
    height:16px;
    margin-right:8px;
    fill:#4da3ff;
    vertical-align:middle;
}

/* Playlist */
.song{
    background:rgba(255,255,255,0.05);
    padding:12px;
    margin-bottom:8px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
    border:1px solid transparent;
}

.song:hover{
    background:rgba(255,255,255,0.1);
}

.song.active{
    border:1px solid #4da3ff;
}

.song img{
    width:45px;
    height:45px;
    border-radius:8px;
    margin-right:10px;
    vertical-align:middle;
}

.song-info{
    display:inline-block;
    vertical-align:middle;
}

/* Fixed Player */
.player{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(20,20,30,0.95);
    border-top:2px solid #4da3ff;
    padding:12px;
}

.player-top{
    display:flex;
    align-items:center;
}

.player img{
    width:55px;
    height:55px;
    border-radius:10px;
    margin-right:12px;
}

.player-info{
    flex:1;
    font-size:14px;
}

.controls{
    text-align:center;
    margin-top:10px;
}

.controls button{
    width:45px;
    height:45px;
    margin:0 8px;
    border-radius:50%;
    border:none;
    background:linear-gradient(45deg,#4da3ff,#7b4dff);
    cursor:pointer;
}

.controls svg{
    width:20px;
    height:20px;
    fill:white;
}

.progress{
    height:5px;
    background:#333;
    border-radius:5px;
    margin-top:8px;
    cursor:pointer;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#4da3ff,#7b4dff);
    border-radius:5px;
}

.volume{
    width:100%;
    margin-top:6px;
    accent-color:#4da3ff;
}

.time{
    font-size:12px;
    text-align:right;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="main">

<div class="header">
    <h1>𝑀𝓎 𝒮𝑜𝓊𝓃𝒹𝓉𝓇𝒶𝒸𝓀 ♫</h1>
</div>

<div class="profile">
    <div class="profile-row">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        Rajendraa Rawat
    </div>

    <div class="profile-row">

        <svg viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.3 7 13 7 13s7-7.7 7-13c0-3.9-3.1-7-7-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5S10.6 6.5 12 6.5s2.5 1.1 2.5 2.5S13.4 11.5 12 11.5z"/></svg>
        Pauri Garhwal, Uttarakhand
    </div>
</div>

<div id="playlist"></div>

</div>

<div class="player">
    <div class="player-top">
        <img id="cover">

    </div>

    <div class="controls">

        </button>

        <button onclick="togglePlay()" id="playBtn">

            </svg>
        </button>

        <button onclick="nextSong()">

        </button>
    </div>

    <div class="progress" onclick="seek(event)">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="time" id="time">0:00 / 0:00</div>

</div>

const playlist=document.getElementById("playlist");
const audio=document.getElementById("audio");
const progressBar=document.getElementById("progressBar");
const volume=document.getElementById("volume");
const timeDisplay=document.getElementById("time");
const playIcon=document.getElementById("playIcon");

let currentIndex=0;
let isPlaying=false;

songs.forEach((song,index)=>{
    const div=document.createElement("div");
    div.className="song";
    div.innerHTML=`
        <img src="${song.cover}">
        <div class="song-info">
            <div>${song.title}</div>
            <div style="font-size:12px; opacity:0.7;">${song.artist}</div>
        </div>`;
    div.onclick=()=>selectSong(index);
    playlist.appendChild(div);
});

function selectSong(index){
    currentIndex=index;
    loadSong();
    playSong();
}

function loadSong(){
    const song=songs[currentIndex];
    audio.src=song.file;
    title.innerText=song.title;
    artist.innerText=song.artist;
    cover.src=song.cover;

    document.querySelectorAll(".song").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".song")[currentIndex].classList.add("active");
}

function togglePlay(){
    if(isPlaying){
        audio.pause();
        playIcon.innerHTML='<path d="M8 5v14l11-7z"/>';
    }else{
        audio.play();
        playIcon.innerHTML='<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';
    }
    isPlaying=!isPlaying;
}

function playSong(){
    audio.play();
    isPlaying=true;
    playIcon.innerHTML='<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';
}

function nextSong(){currentIndex=(currentIndex+1)%songs.length;loadSong();playSong();}
function prevSong(){currentIndex=(currentIndex-1+songs.length)%songs.length;loadSong();playSong();}

audio.addEventListener("ended",nextSong);

audio.addEventListener("timeupdate",()=>{
    const percent=(audio.currentTime/audio.duration)*100;
    progressBar.style.width=percent+"%";

    const m=Math.floor(audio.currentTime/60);
    const s=Math.floor(audio.currentTime%60).toString().padStart(2,"0");
    const tm=Math.floor(audio.duration/60)||0;
    const ts=Math.floor(audio.duration%60)||0;
    timeDisplay.innerText=`${m}:${s} / ${tm}:${ts}`;
});

function seek(e){
    const width=e.currentTarget.clientWidth;
    audio.currentTime=(e.offsetX/width)*audio.duration;
}

volume.addEventListener("input",()=>audio.volume=volume.value);

loadSong();

</script>
